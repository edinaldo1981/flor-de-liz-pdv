services:
  app:
    build: .
    container_name: anotafacil_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://anotafacil:${POSTGRES_PASSWORD}@db:5432/anotafacil
      JWT_SECRET: ${JWT_SECRET}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
      ASAAS_API_KEY: ${ASAAS_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: anotafacil_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anotafacil
      POSTGRES_USER: anotafacil
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backup_producao_20260316_191428.sql:/docker-entrypoint-initdb.d/backup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anotafacil -d anotafacil"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
