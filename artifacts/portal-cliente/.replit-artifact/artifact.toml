kind = "web"
previewPath = "/portal-cliente/"
title = "Portal do Cliente - Flor de Liz"
version = "1.0.0"
id = "artifacts/portal-cliente"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21045
name = "web"
paths = ["/portal-cliente/"]

[services.development]
run = "pnpm --filter @workspace/portal-cliente run dev"

[services.env]
PORT = "21045"
BASE_PATH = "/portal-cliente/"

[services.production]
build = ["pnpm", "--filter", "@workspace/portal-cliente", "run", "build"]
publicDir = "artifacts/portal-cliente/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
